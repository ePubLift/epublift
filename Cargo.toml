[workspace]
members = [".", "epublift-web"]
resolver = "2"

[package]
name = "epublift"
version = "1.2.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "Modernize and optimize EPUB files — upgrade structure and re-encode images"
readme = "README.md"
rust-version = "1.94"
authors = ["Baris Kayadelen <baris@kayadelen.com>"]
repository = "https://github.com/ePubLift/epublift"
homepage = "https://github.com/ePubLift/epublift"
keywords = ["epub", "webp", "ebook", "epub3", "converter"]
categories = ["command-line-utilities", "multimedia::images"]

[[bin]]
name = "epublift"
path = "src/main.rs"

[[bin]]
name = "gen-sample"
path = "src/bin/gen_sample.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
zip = { version = "8", default-features = false, features = ["deflate"] }
image = { version = "0.25", default-features = false, features = ["jpeg", "png"] }
zenwebp = "0.4"
quick-xml = "0.40"
roxmltree = "0.21"
regex = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
tempfile = "3"
walkdir = "2"
anyhow = "1"
percent-encoding = "2"
any_ascii = "0.3"

[dev-dependencies]
# Used by the integration tests to assemble EPUB fixtures and inspect output.
zip = { version = "8", default-features = false, features = ["deflate"] }
image = { version = "0.25", default-features = false, features = ["jpeg", "png"] }
tempfile = "3"

[profile.release]
opt-level = 3
lto = true
