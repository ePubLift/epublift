[package]
name = "epublift-web"
# Versioned independently from the CLI: releases on `web-v*` tags. Baselined to
# 1.3.0 (the GHCR image was at :1.3.0); 1.4.0 adds the multi-language UI.
version = "1.4.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "Web service front-end for epublift: convert EPUBs in the browser"
repository = "https://github.com/ePubLift/epublift"
rust-version = "1.94"
publish = false

[dependencies]
epublift = { path = ".." }
axum = { version = "0.8", features = ["multipart"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net"] }
tower = "0.5"
tower-http = { version = "0.7", features = ["timeout", "cors", "set-header"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tempfile = "3"
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
