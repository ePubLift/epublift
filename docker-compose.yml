# Self-host epublift-web. By default this pulls the published image; to build
# from source instead, comment out `image:` and uncomment `build: .`.
#
# Put a reverse proxy (e.g. Nginx Proxy Manager, Caddy, Traefik) in front for
# TLS. Out of the box the service speaks plain HTTP on 8080, bound to localhost
# so only a proxy on the same host reaches it. `docker compose up` just works.
services:
  epublift-web:
    image: ghcr.io/epublift/epublift-web:latest
    # build: .
    container_name: epublift-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"

    # Optional: a Google Books API key for the Metadata editor's ISBN enrichment.
    # Anonymous Google Books calls share a small daily quota (HTTP 429); set
    # GOOGLE_BOOKS_API_KEY in your environment (or a .env file) to use your own.
    # Leave it unset to use Open Library (the default provider) only.
    environment:
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY:-}

    # --- hardening ---
    read_only: true            # immutable root filesystem
    tmpfs:
      - /tmp                    # the only writable path; uploads live here briefly
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    pids_limit: 256

# --- Optional: block egress (defense in depth) -------------------------------
# Conversion / archive / restore make no outbound connections — only the
# Metadata editor's ISBN enrichment does (Open Library / Google Books over
# HTTPS). If you don't use ISBN enrichment, you can cut the container's internet
# access entirely with a Docker `internal` network (note it *also* blocks
# published ports — that's by design: `internal` isolates the network from
# everything outside it). So you cannot combine `internal:` with the `ports:`
# above; instead the reverse proxy must join the network and reach the service by
# name. (With egress blocked, ISBN enrichment will fail — that's expected.) To enable:
#
#   1. Remove the `ports:` block above.
#   2. Add to the service:
#        networks:
#          - epublift-internal
#   3. Uncomment the `networks:` block below.
#   4. Attach your reverse proxy container to `epublift-internal` too, and
#      point it at  http://epublift-web:8080  (container name, not localhost).
#
# Result: epublift-web has no route to the internet, while the proxy still
# reaches it over the internal network.
#
# networks:
#   epublift-internal:
#     internal: true
