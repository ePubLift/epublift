name: Release

# Build cross-platform binaries and attach them to a GitHub Release.
# Fires when a version tag is pushed (e.g. `v1.1.0`). Can also be run
# manually against an existing tag via the Actions tab.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Keep the binary small; the release profile already enables LTO.
  RUSTFLAGS: "-C strip=symbols"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          # Both macOS targets build on the arm64 runner: macos-14 cross-compiles
          # the x86_64 binary fine, and avoids the scarce/slow macos-13 Intel
          # runner pool that previously left this job queued indefinitely.
          - os: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz

    steps:
      - name: Check out the tag
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --bin epublift --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#v}"
          name="epublift-${version}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/epublift" "$name/"
          cp README.md LICENSE CHANGELOG.md "$name/"
          tar -czf "${name}.tar.gz" "$name"
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#v}"
          name="epublift-${version}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/epublift.exe" "$name/"
          cp README.md LICENSE CHANGELOG.md "$name/"
          7z a "${name}.zip" "$name"
          certutil -hashfile "${name}.zip" SHA256 > "${name}.zip.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: epublift-${{ matrix.target }}
          path: |
            epublift-*.tar.gz
            epublift-*.tar.gz.sha256
            epublift-*.zip
            epublift-*.zip.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*
