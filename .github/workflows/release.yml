name: Release

# Build cross-platform CLI binaries and attach them to a GitHub Release.
# Fires when a CLI tag is pushed (e.g. `cli-v1.3.1`). The CLI and the web
# service (`epublift-web`) are versioned independently: CLI binaries release on
# `cli-v*` tags, the web Docker image releases on `web-v*` tags (see docker.yml).
# Can also be run manually against an existing tag via the Actions tab.

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing CLI tag to build and release (e.g. cli-v1.3.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Keep the binary small; the release profile already enables LTO.
  RUSTFLAGS: "-C strip=symbols"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          # ARM64 Linux — Raspberry Pi (64-bit OS) / arm64 NAS & servers. Built
          # natively on a GitHub arm64 runner; static musl = runs on any distro.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          # Both macOS targets build on the arm64 runner: macos-14 cross-compiles
          # the x86_64 binary fine, and avoids the scarce/slow macos-13 Intel
          # runner pool that previously left this job queued indefinitely.
          - os: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz

    steps:
      - name: Check out the tag
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: endsWith(matrix.target, '-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Ship the optional features in the released binaries:
      #   - `epub34`   — experimental EPUB 3.4 image codecs (AVIF / JPEG XL;
      #     zenavif/zenjxl). `--target 3.4` stays opt-in at runtime.
      #   - `metadata` — `meta enrich` ISBN lookup (Open Library). Its HTTPS client
      #     is rustls + the RustCrypto provider + webpki-roots.
      #   - `pdf-ocr`  — experimental `import` (PDF → reflowable EPUB), including
      #     OCR of scanned PDFs (ocrs + rten; models download at runtime). Implies
      #     `pdf`. Pure Rust — no C/ONNX-runtime.
      # All are 100% pure Rust — no C/nasm toolchain — so they build across all
      # targets (musl, windows-msvc, macOS).
      - name: Build release binary
        run: cargo build --release --locked --features epub34,metadata,pdf-ocr,markdown --bin epublift --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#cli-v}"
          name="epublift-${version}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/epublift" "$name/"
          cp README.md LICENSE CHANGELOG.md "$name/"
          tar -czf "${name}.tar.gz" "$name"
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#cli-v}"
          name="epublift-${version}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/epublift.exe" "$name/"
          cp README.md LICENSE CHANGELOG.md "$name/"
          7z a "${name}.zip" "$name"
          certutil -hashfile "${name}.zip" SHA256 > "${name}.zip.sha256"

      # Linux distro packages: .deb (Debian/Ubuntu/Raspberry Pi OS) and .rpm
      # (Fedora/RHEL/openSUSE), amd64 + arm64. Each Linux target builds on its own
      # -arch runner, so the host arch == target arch: we copy the native static
      # binary to target/release/ and package WITHOUT --target, which labels the
      # arch correctly and reuses the binary built above (no rebuild). Both tools
      # are pure Rust — no dpkg-dev or rpmbuild needed. `--no-strip` keeps our
      # RUSTFLAGS strip.
      - name: Build .deb + .rpm packages (Linux)
        if: endsWith(matrix.target, '-linux-musl')
        shell: bash
        run: |
          mkdir -p target/release
          cp "target/${{ matrix.target }}/release/epublift" target/release/epublift
          cargo install cargo-deb cargo-generate-rpm --locked
          cargo deb --no-build --no-strip
          cargo generate-rpm
          for pkg in target/debian/*.deb target/generate-rpm/*.rpm; do
            cp "$pkg" .
            shasum -a 256 "$(basename "$pkg")" > "$(basename "$pkg").sha256"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: epublift-${{ matrix.target }}
          path: |
            epublift-*.tar.gz
            epublift-*.tar.gz.sha256
            epublift-*.zip
            epublift-*.zip.sha256
            epublift*.deb
            epublift*.deb.sha256
            epublift*.rpm
            epublift*.rpm.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Check out first (clean), so the artifact download below isn't wiped, and
      # so CHANGELOG.md is available to build the release notes.
      - name: Check out the tag
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      # Pull this version's section out of CHANGELOG.md (from its `## [<tag>]`
      # heading up to the next `## [` heading) as the curated release body. The
      # action still appends the auto-generated "Full Changelog" notes below it.
      - name: Build release notes from CHANGELOG
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          awk -v t="[$tag]" '
            /^## / { if (seen) exit; if (index($0, t)) { seen = 1; next } }
            seen { print }
          ' CHANGELOG.md | sed '/./,$!d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG entry found for $tag — see CHANGELOG.md." > RELEASE_NOTES.md
          fi
          echo "----- release notes for $tag -----"
          cat RELEASE_NOTES.md

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: dist/*
