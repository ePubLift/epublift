name: CI

# Build, test, and lint on every pull request and on pushes to main.
# Keeps the tree formatted, clippy-clean, and green before release tags are cut.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets --locked

      # The experimental Zstd-OCF research track is behind a default-off feature
      # (pure Rust, no C). Build + test it too so it doesn't rot. The C ceiling
      # (`zstd-c-bench`) is intentionally NOT built in CI — it pulls libzstd and
      # is a local dev convenience only.
      - name: Clippy (zstd-experimental + pdf-ocr)
        run: cargo clippy --all-targets --locked --features zstd-experimental,pdf-ocr -- -D warnings

      - name: Test (zstd-experimental + pdf-ocr)
        run: cargo test --all-targets --locked --features zstd-experimental,pdf-ocr
