name: Docker

# Build and publish the epublift-web container image to GHCR.
# Fires on a web tag (e.g. `web-v1.4.0`). The web service and the CLI are
# versioned independently: the image releases on `web-v*` tags, CLI binaries on
# `cli-v*` tags (see release.yml). The image is tagged with the web version
# (`:1.4.0`) plus `:latest`. Can also be run on demand (pushes a transient `edge`).
#
# Each architecture is built on a *native* runner (no QEMU emulation), then a
# final job stitches the per-arch images into one multi-arch manifest. This is
# dramatically faster than emulating arm64 — emulated Rust compiles took ~30 min.

on:
  push:
    tags:
      - "web-v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # GHCR paths must be lowercase; the org is ePubLift.
  IMAGE: ghcr.io/epublift/epublift-web

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Prepare platform name
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}

      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # The build context excludes `.git`, so pass the commit for the footer's
          # version/commit link (build.rs reads $GIT_SHA).
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v5
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & push manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v5
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Extract the version from the `web-vX.Y.Z` tag (-> image tag `X.Y.Z`),
          # plus `latest` on tag pushes; `edge` only for manual test runs.
          tags: |
            type=match,pattern=web-v(.*),group=1
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=edge,enable=${{ github.ref_type != 'tag' }}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
